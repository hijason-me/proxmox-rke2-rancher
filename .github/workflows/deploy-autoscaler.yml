name: Build & Deploy Autoscaler

on:
  push:
    branches: [main]
    paths:
      - "autoscaler/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/autoscaler

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: autoscaler
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Management Cluster
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_MGMT" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
        env:
          KUBECONFIG_MGMT: ${{ secrets.KUBECONFIG_MGMT }}

      - name: Create/update autoscaler secrets
        run: |
          kubectl create secret generic proxmox-autoscaler-secrets \
            --from-literal=PROXMOX_URL="${PROXMOX_URL}" \
            --from-literal=PROXMOX_TOKEN_ID="${PROXMOX_TOKEN_ID}" \
            --from-literal=PROXMOX_TOKEN_SECRET="${PROXMOX_TOKEN_SECRET}" \
            --from-literal=RKE2_SERVER_URL="${RKE2_SERVER_URL}" \
            --from-literal=RKE2_TOKEN="${RKE2_TOKEN}" \
            --from-literal=KUBECONFIG="${KUBECONFIG_WORKLOAD}" \
            --namespace kube-system \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          PROXMOX_URL: ${{ secrets.PROXMOX_URL }}
          PROXMOX_TOKEN_ID: ${{ secrets.PROXMOX_TOKEN_ID }}
          PROXMOX_TOKEN_SECRET: ${{ secrets.PROXMOX_TOKEN_SECRET }}
          RKE2_SERVER_URL: ${{ secrets.RKE2_SERVER_URL }}
          RKE2_TOKEN: ${{ secrets.RKE2_TOKEN }}
          KUBECONFIG_WORKLOAD: ${{ secrets.KUBECONFIG_WORKLOAD }}

      - name: Helm upgrade autoscaler
        run: |
          helm upgrade --install proxmox-autoscaler autoscaler/helm/autoscaler \
            --namespace kube-system \
            --set image.tag="${{ needs.build-push.outputs.image_tag }}" \
            --atomic \
            --timeout 5m

      - name: Verify deployment
        run: kubectl rollout status deployment/proxmox-autoscaler -n kube-system --timeout=120s
