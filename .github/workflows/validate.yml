name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [management-cluster, workload-cluster]
    defaults:
      run:
        working-directory: terraform/${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (dry-run without state)
        run: |
          # Generate a minimal tfvars for syntax check only
          cat > /tmp/check.tfvars << 'EOF'
          proxmox_url          = "https://127.0.0.1:8006"
          proxmox_token_id     = "user@pam!token"
          proxmox_token_secret = "secret"
          proxmox_nodes        = ["pve1"]
          ssh_public_keys      = ["ssh-ed25519 AAAA test"]
          rke2_token           = "token"
          mgmt_vip             = "10.0.0.1"
          mgmt_cp_ips          = ["10.0.0.2","10.0.0.3","10.0.0.4"]
          gateway              = "10.0.0.254"
          EOF
          terraform plan -var-file=/tmp/check.tfvars -input=false 2>&1 | head -60 || true

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-lint
      - run: ansible-lint ansible/playbooks/ ansible/roles/

  docker-build:
    name: Build Autoscaler Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: autoscaler
          push: false
          tags: proxmox-autoscaler:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint autoscaler/helm/autoscaler/
