---
- name: Common OS preparation
  hosts: all
  become: true
  roles:
    - common

- name: Bootstrap RKE2 servers
  hosts: rke2_servers
  become: true
  serial:
    - 1     # first server bootstraps alone
    - "50%" # remaining servers join in parallel batches
  roles:
    - role: rke2-server
      tags: always

- name: Join RKE2 agents
  hosts: rke2_agents
  become: true
  roles:
    - rke2-agent
